<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube Fly</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <script type="text/javascript" src="/static/js/libs/head.load.min.js"></script>
  <script type="text/javascript">
  head.load(
    "/static/css/lib/bootstrap.min.css",
    "/static/css/lib/font-awesome.min.css",
    "/static/css/lab.css"
  );
  </script>
  <style>
  #container {
    background: #000;
    width: 100%;
    height: 100%;
    overflow: hidden;
    margin: 0;
    padding: 0;
    z-index: -5;
  }
  #time{
    position: absolute;
    top: 0;
    height: 200px;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 3;
    font: 20px "Arial";
  }
  #text{
    position: absolute;
    top: 50%;
    margin-top: -100px;
    height: 200px;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 4;
  }
  #heading{
    color: rgba(0,0,0,0.8);
    font: 100px "Arial Black";
  }
  #subtitle{
    color: rgba(0,0,0,0.5);
    font: 30px "Arial";
  }
  #pp{
    position: absolute;
    left: 5px;
    bottom: 50px;
    text-align: left;
    z-index: 4;
    font: 15px "Arial Black";
    padding: 4px;
  }
  #song{
    position: absolute;
    right: 10px;
    bottom: 55px;
    text-align: right;
    z-index: 4;
  }
  #song, #song a{
    font: 20px "Arial";
    text-decoration: none;
  }
</style>
<script src="/static/js/libs/Three.js"></script>
<script src="/static/js/libs/Stats.js"></script>
</head>
<body>
  <div id="container">
  </div>

  <div id="time"></div>

  <div id="text">
    <span id="heading"></span>
    <br/>
    <span id="subtitle"></span>
  </div>

  <div id="song">Song: <a href="http://totallyenormousextinctdinosaurs.tumblr.com/" target="_blank">Tapes and Money - TEED</a></div>
  <div id="pp">Pause Music</div>

  <audio id="audioElem" autoplay="autoplay" loop="loop">
    <source src="/static/res/tam.mp3" type="audio/mpeg">
  </audio>

  <script type="text/javascript">
    head.js(
      "/static/js/libs/jquery.min.js",
      "/static/js/libs/bootstrap.min.js",
      "/static/js/lab/all.js",
      "/static/js/lab/cubefly.js"
    );
  </script>
  

  <nav class="navbar navbar-default navbar-fixed-bottom" role="navigation" id="foot">
    <div class="navbar-header">
      <div class="navbar-brand">Cube Fly</div>
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
      <ul class="nav navbar-nav" role="navigation">
        <li><a href="/lab/">More Experiments</a></li>
        <li><a href="/">Kaiserapps Home</a></li>
      </ul>
      <ul class="nav navbar-nav pull-right">
        <li><a href="#" onclick="$('#foot').css('display','none')"><i class="icon-chevron-down icon-white"></i></a></li>
      </ul>
    </div>
  </nav>
</body>
</html>
