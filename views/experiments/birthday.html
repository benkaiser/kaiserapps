{% extends '../base/experiment_base.html' %}

{% block title %}Birthday{% endblock %}

{% block head %}
<style type="text/css">
html, body, #canvas{
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  cursor: crosshair;
  overflow: hidden !important;
}
#bday{
  font-size: 80px;
  font-familt: "Helvetica Neue", Helvetica, Arial, sans-serif;
  position: absolute;
  text-align: center;
  width: 80%;
  margin-left: 10%;
  top:50%;
  left: 0;
  color: #4bf;
  text-shadow:

   -2px -2px 0 #FFF,
    2px -2px 0 #FFF,
    -2px 2px 0 #FFF,
     2px 2px 0 #FFF;
  line-height: 2;
  display: none;
  /* disable text selection */
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  -khtml-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
</style>
{% endblock %}

{% block content %}
<div id="birthdayItem">
  <canvas id="canvas"></canvas>
  <h1 id='bday'>Happy `age` Birthday `name`!</h1>
</div>
<div id="formItem">
  <form method="GET" action='birthday'>
    <div class="modal">
      <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
          <h3>Birthday Form</h3>
        </div>
        <div class="modal-body">
          <label>Please enter a name:</label>
          <input class="form-control" type="text" name="name" id="name" onkeyup='updatelink()' />
          <label>Please enter an age:</label>
          <input class="form-control" type="text" name="age" id="age" onkeyup='updatelink()'/>
          <label>To share this card, send this link:<br/><a href="#" id="link"></a><label>
        </div>
        <div class="modal-footer">
          <input type="submit" class="btn btn-primary" value="Go!">
        </div>
      </div>
      </div>
    </div>
  </form>
</div>
{% endblock %}
