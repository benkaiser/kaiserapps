
{% extends '../base/experiment_base.html' %}

{% block title %}Psy!{% endblock %}

{% block head %}
<script src="/static/js/libs/dat.gui.js"></script>
<style type="text/css">
html, body, #canvas{
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}
#response{
  position: fixed;
  top: 0;
  left: 0;
  display: none;
  padding: 10px;
  border: 3px solid rgba(255,255,255,0.5);
  background-color:#fff;
  border-left-width: 0;
  border-top-width: 0;
  border-bottom-right-radius: 10px;
  font: 11px 'Lucida Grande', sans-serif;
}
#hiddenCanvas{
  display: none;
}
</style>
{% endblock %}

{% block content %}
<canvas id="canvas"></canvas>
<canvas id="hiddenCanvas"></canvas>
<div id="response"></div>
{% endblock %}
