<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}Kaiserapps Lab Experiment{% endblock %}</title>

  <script type="text/javascript" src="/static/js/libs/head.load.min.js"></script>

  <link rel="icon" type="image/png" href="/static/img/favicon.png">

  <script type="text/javascript">
  head.load(
    "/static/css/lib/bootstrap.min.css",
    "/static/css/lib/font-awesome.min.css",
    "/static/css/lab.css"
    );
  </script>
  {% block head %}
  {% endblock %}
</head>
<body>
  {% block content %}
  {% endblock %}

  <script type="text/javascript">
    head.js(
      "/static/js/libs/jquery.min.js",
      "/static/js/libs/bootstrap.min.js",
      "/static/js/lab/all.js",
      "/static/js/lab/{{experiment}}.js"
      );
  </script>
  {% block scripts %}
  {% endblock %}

  <nav class="navbar navbar-default navbar-fixed-bottom" role="navigation" id="foot">
    <!-- Brand and toggle get grouped for better mobile display -->
    <div class="navbar-header">
      <div class="navbar-brand">{% block title %}Lab Experiment{% endblock %}</div>
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
      <ul class="nav navbar-nav" role="navigation">
        <li><a href="/lab">More Experiments</a></li>
        <li><a href="/">Kaiserapps Home</a></li>
      </ul>
      <ul class="nav navbar-nav pull-right">
        <li><a href="#" onclick="$('#toDisplay').css('display','none')"><i class="icon-chevron-down icon-white"></i></a></li>
      </ul>
    </div>
  </nav>
</body>
</html>
