<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lab — Kaiserapps</title>
  <meta name="description" content="Interactive canvas experiments — games, animations, and visualizers built with HTML5 Canvas and WebGL.">
  <link rel="icon" type="image/png" href="../static/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../js/theme-toggle.js"></script>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .lab-hero {
      padding-top: calc(var(--nav-height) + var(--space-2xl));
      padding-bottom: var(--space-xl);
      text-align: center;
    }

    .lab-intro {
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
      color: var(--text-secondary);
    }

    /* --- Always-split layout --- */
    .lab-split {
      display: flex;
      gap: var(--space-lg);
      min-height: 70vh;
    }

    .lab-list {
      width: 380px;
      min-width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      padding-right: var(--space-xs);
    }

    /* Thin scrollbar for the list */
    .lab-list::-webkit-scrollbar { width: 4px; }
    .lab-list::-webkit-scrollbar-track { background: transparent; }
    .lab-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

    .lab-preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: sticky;
      top: calc(var(--nav-height) + var(--space-md));
      height: calc(100vh - var(--nav-height) - var(--space-xl));
      align-self: flex-start;
    }

    .lab-preview-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      min-height: 500px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    .lab-preview-content {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    .lab-preview-content.active {
      display: flex;
    }

    .lab-preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: var(--space-sm);
    }

    .lab-preview-header h2 {
      font-size: 1.2rem;
      margin: 0;
    }

    .lab-preview-header a {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .lab-preview-content iframe {
      flex: 1;
      width: 100%;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: #000;
      min-height: 500px;
    }

    /* --- Experiment cards --- */
    .experiment-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .experiment-card:hover {
      background: var(--bg-card-hover);
    }

    .experiment-card.active {
      border-color: var(--ka-purple);
      background: var(--bg-card-hover);
    }

    [data-theme="dark"] .experiment-card.active {
      border-color: var(--ka-cyan);
    }

    .experiment-card img {
      width: 100%;
      aspect-ratio: 2/1;
      object-fit: cover;
      border-bottom: 1px solid var(--border-color);
    }

    .experiment-card-body {
      padding: var(--space-sm) var(--space-md) var(--space-md);
    }

    .experiment-card-body h3 {
      font-size: 0.95rem;
      margin: 0 0 var(--space-xs) 0;
    }

    .experiment-card-body p {
      font-size: 0.8rem;
      margin: 0;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* --- Mobile: no preview, just a list that links out --- */
    @media (max-width: 900px) {
      .lab-split {
        flex-direction: column;
      }

      .lab-list {
        width: 100%;
        min-width: unset;
      }

      .lab-preview {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  {{> nav-lab}}

  <div class="lab-hero" id="lab-hero">
    <div class="container">
      <h1><span class="text-gradient">The Lab</span></h1>
      <p class="lab-intro">
        A directory of fun experiments I created back in 2011. Most are a mixture of HTML5 Canvas and JavaScript
        (with the occasional Three.js). Best experienced on desktop.
      </p>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="lab-split" id="lab-split">
        <div class="lab-list" id="lab-list">
          <!-- Populated by JS -->
        </div>
        <div class="lab-preview">
          <div class="lab-preview-placeholder" id="lab-placeholder">
            Select an experiment to preview
          </div>
          <div class="lab-preview-content" id="lab-preview-content">
            <div class="lab-preview-header">
              <h2 id="preview-title"></h2>
              <a id="preview-link" href="#" target="_blank">Open in New Window →</a>
            </div>
            <iframe id="preview-iframe" src="about:blank"></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

  {{> footer}}

  <script>
    const experiments = [
      { name: "Cube Fly", desc: "Immersive 3D game where you are the grey cube and must dodge the ever-faster approaching colored cubes.", img: "../static/img/lab/cubefly.png", slug: "cubefly" },
      { name: "Vis", desc: "Music visualiser in JavaScript using Chrome's audio API.", img: "../static/img/lab/vis.png", slug: "vis" },
      { name: "Psy!", desc: "Interactive painting application that lets you create drawings made out of large squares. Save and share your creations.", img: "../static/img/lab/psy.png", slug: "psy" },
      { name: "Wobble", desc: "A fun experiment getting used to the quadraticCurveTo() canvas function.", img: "../static/img/lab/wobble.png", slug: "wobble" },
      { name: "Spider Wobble", desc: "Changing spawn point version of Wobble — creates lines autonomously.", img: "../static/img/lab/spiderwobble.png", slug: "spiderwobble" },
      { name: "Nexus", desc: "Inspired by the standard Android live wallpaper, recreated in canvas with a Kaiserapps touch.", img: "../static/img/lab/nexus.png", slug: "nexus" },
      { name: "Birthday Card Creator", desc: "Originally a custom birthday card for a friend, made dynamic so anyone can create and send one.", img: "../static/img/lab/birthday.png", slug: "birthday" },
      { name: "Fader", desc: "A screen saver idea inspired by watching the animations behind lyrics at church. Co-developed with Eden Vicary.", img: "../static/img/lab/fader.png", slug: "fader" },
      { name: "Tunnel Fader", desc: "Fader modification to look like a tunnel.", img: "../static/img/lab/tunnelfader.png", slug: "tunnelfader" },
      { name: "Tunnel", desc: "A psychedelic tunnel animation.", img: "../static/img/lab/tunnel.png", slug: "tunnel" },
      { name: "Snafu!", desc: "My attempt at recreating the classic arcade snake game. Two-player: P1 WASD, P2 arrow keys.", img: "../static/img/lab/snafu.png", slug: "snafu" },
      { name: "Underwater Bubbles", desc: "Simulated bubbles floating up in water. Move the cursor to move the spawn point.", img: "../static/img/lab/underwaterbubbles.png", slug: "ub" },
      { name: "Dual Bubble Cannons", desc: "A nice screen saver — no interactivity.", img: "../static/img/lab/dbc.png", slug: "dbc" },
      { name: "Hearts", desc: "A remix of the Underwater Bubbles creation using text hearts instead of circles.", img: "../static/img/lab/hearts.png", slug: "hearts" },
      { name: "Prime Nightmare", desc: "Shows prime numbers in sequence coming from the cursor. Made for my brother Josh.", img: "../static/img/lab/primenightmare.png", slug: "prime" },
      { name: "XTT", desc: "Custom message maker using canvas text drawing and CSS3 @font-face. The eXtensive Text Transposer.", img: "../static/img/lab/xtt.png", slug: "xtt" },
      { name: "Mojo vs. Mine", desc: "First game I created on canvas that got me interested. Two-player: Mojo=arrows, Mine=WASD.", img: "../static/img/lab/mojo.png", slug: "mojo" },
      { name: "Ball in Box", desc: "Experimenting with a moving spawn point.", img: "../static/img/lab/bib.png", slug: "bib" },
    ];

    const list = document.getElementById('lab-list');
    const placeholder = document.getElementById('lab-placeholder');
    const previewContent = document.getElementById('lab-preview-content');
    const previewIframe = document.getElementById('preview-iframe');
    const previewTitle = document.getElementById('preview-title');
    const previewLink = document.getElementById('preview-link');

    experiments.forEach((exp, i) => {
      const card = document.createElement('div');
      card.className = 'experiment-card';
      card.innerHTML = `
        <img src="${exp.img}" alt="${exp.name}" loading="lazy">
        <div class="experiment-card-body">
          <h3>${exp.name}</h3>
          <p>${exp.desc}</p>
        </div>
      `;
      card.addEventListener('click', () => openExperiment(i));
      list.appendChild(card);
    });

    function isMobile() {
      return window.innerWidth <= 900;
    }

    function openExperiment(index) {
      const exp = experiments[index];

      if (isMobile()) {
        window.open(`./${exp.slug}.html`, '_blank');
        return;
      }

      // Hide placeholder, show preview
      placeholder.style.display = 'none';
      previewContent.classList.add('active');

      // Highlight active card
      list.querySelectorAll('.experiment-card').forEach(c => c.classList.remove('active'));
      list.children[index].classList.add('active');

      // Load experiment
      previewIframe.src = `./${exp.slug}.html`;
      previewTitle.textContent = exp.name;
      previewLink.href = `./${exp.slug}.html`;

      // Scroll active card into view
      list.children[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
