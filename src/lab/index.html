<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lab — Kaiserapps</title>
  <meta name="description" content="Interactive canvas experiments — games, animations, and visualizers built with HTML5 Canvas and WebGL.">
  <link rel="icon" type="image/png" href="../static/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../js/theme-toggle.js"></script>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .lab-hero {
      padding-top: calc(var(--nav-height) + var(--space-2xl));
      padding-bottom: var(--space-xl);
      text-align: center;
    }

    .lab-intro {
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
      color: var(--text-secondary);
    }

    /* --- Split layout --- */
    .lab-split {
      display: flex;
      gap: var(--space-lg);
      min-height: 70vh;
      transition: all 0.35s ease;
    }

    .lab-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      flex-shrink: 0;
      overflow-y: auto;
      max-height: calc(100vh - 100px);
      padding-right: var(--space-sm);
      transition: width 0.35s ease;
    }

    /* Default: list takes full width as a grid */
    .lab-split:not(.split-active) .lab-list {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      max-height: none;
      overflow: visible;
    }

    /* When split is active: list becomes narrow sidebar */
    .lab-split.split-active .lab-list {
      width: 340px;
      min-width: 340px;
    }

    .lab-preview {
      flex: 1;
      display: none;
      flex-direction: column;
      min-width: 0;
    }

    .lab-split.split-active .lab-preview {
      display: flex;
    }

    .lab-preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-md) 0;
    }

    .lab-preview-header h2 {
      font-size: 1.3rem;
      margin: 0;
    }

    .lab-preview-close {
      background: none;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all var(--transition-fast);
    }

    .lab-preview-close:hover {
      border-color: var(--ka-pink);
      color: var(--ka-pink);
    }

    .lab-preview iframe {
      flex: 1;
      width: 100%;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      background: #000;
      min-height: 500px;
    }

    .lab-preview-actions {
      padding: var(--space-sm) 0;
      display: flex;
      gap: var(--space-md);
    }

    .lab-preview-actions a {
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* --- Experiment cards --- */
    .experiment-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all var(--transition-normal);
      cursor: pointer;
    }

    .experiment-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .experiment-card.active {
      border-color: var(--ka-purple);
      box-shadow: 0 0 0 2px var(--ka-purple);
    }

    [data-theme="dark"] .experiment-card.active {
      border-color: var(--ka-cyan);
      box-shadow: 0 0 0 2px var(--ka-cyan);
    }

    .experiment-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-bottom: 1px solid var(--border-color);
    }

    .experiment-card-body {
      padding: var(--space-sm) var(--space-md);
    }

    .experiment-card-body h3 {
      font-size: 1rem;
      margin-bottom: 2px;
    }

    .experiment-card-body p {
      font-size: 0.8rem;
      margin-bottom: 0;
      color: var(--text-muted);
    }

    /* In split mode, hide descriptions and shrink cards */
    .lab-split.split-active .experiment-card-body p {
      display: none;
    }

    .lab-split.split-active .experiment-card img {
      aspect-ratio: 2/1;
    }

    .lab-split.split-active .experiment-card:hover {
      transform: none;
    }

    @media (max-width: 900px) {
      .lab-split.split-active {
        flex-direction: column;
      }

      .lab-split.split-active .lab-list {
        width: 100%;
        min-width: unset;
        flex-direction: row;
        overflow-x: auto;
        overflow-y: visible;
        max-height: none;
        gap: var(--space-sm);
        padding-bottom: var(--space-sm);
      }

      .lab-split.split-active .lab-list .experiment-card {
        min-width: 200px;
        flex-shrink: 0;
      }

      .lab-preview iframe {
        min-height: 300px;
      }
    }

    @media (max-width: 768px) {
      .lab-split:not(.split-active) .lab-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  {{> nav-lab}}

  <div class="lab-hero" id="lab-hero">
    <div class="container">
      <h1><span class="text-gradient">The Lab</span></h1>
      <p class="lab-intro">
        A directory of fun experiments I created back in 2011. Most are a mixture of HTML5 Canvas and JavaScript
        (with the occasional Three.js). Best experienced on desktop.
      </p>
    </div>
  </div>

  <section class="section" style="padding-top: 0;">
    <div class="container">
      <div class="lab-split" id="lab-split">
        <div class="lab-list" id="lab-list">
          <!-- Populated by JS -->
        </div>
        <div class="lab-preview" id="lab-preview">
          <div class="lab-preview-header">
            <h2 id="preview-title"></h2>
            <button class="lab-preview-close" onclick="closePreview()">Close Preview</button>
          </div>
          <iframe id="preview-iframe" src="about:blank"></iframe>
          <div class="lab-preview-actions">
            <a id="preview-link" href="#" target="_blank">Open in New Window →</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  {{> footer}}

  <script>
    const experiments = [
      { name: "Cube Fly", desc: "Immersive 3D dodge game — dodge the approaching colored cubes.", img: "../static/img/lab/cubefly.png", slug: "cubefly" },
      { name: "Vis", desc: "Music visualizer using Chrome's Web Audio API.", img: "../static/img/lab/vis.png", slug: "vis" },
      { name: "Psy!", desc: "Interactive painting app with large colored squares.", img: "../static/img/lab/psy.png", slug: "psy" },
      { name: "Wobble", desc: "Fun with the quadraticCurveTo() canvas function.", img: "../static/img/lab/wobble.png", slug: "wobble" },
      { name: "Spider Wobble", desc: "Autonomous line spawning variant of Wobble.", img: "../static/img/lab/spiderwobble.png", slug: "spiderwobble" },
      { name: "Nexus", desc: "Recreation of the Android Nexus live wallpaper.", img: "../static/img/lab/nexus.png", slug: "nexus" },
      { name: "Birthday Card Creator", desc: "Dynamic birthday card maker with fireworks.", img: "../static/img/lab/birthday.png", slug: "birthday" },
      { name: "Fader", desc: "Screen saver inspired by church lyric backgrounds.", img: "../static/img/lab/fader.png", slug: "fader" },
      { name: "Tunnel Fader", desc: "Fader modification that looks like a tunnel.", img: "../static/img/lab/tunnelfader.png", slug: "tunnelfader" },
      { name: "Tunnel", desc: "A psychedelic tunnel animation.", img: "../static/img/lab/tunnel.png", slug: "tunnel" },
      { name: "Snafu!", desc: "Classic snake game. P1: WASD, P2: arrow keys.", img: "../static/img/lab/snafu.png", slug: "snafu" },
      { name: "Underwater Bubbles", desc: "Simulated bubbles floating upward in water.", img: "../static/img/lab/underwaterbubbles.png", slug: "ub" },
      { name: "Dual Bubble Cannons", desc: "A screen saver with bubble cannons.", img: "../static/img/lab/dbc.png", slug: "dbc" },
      { name: "Hearts", desc: "Underwater Bubbles remix using text hearts.", img: "../static/img/lab/hearts.png", slug: "hearts" },
      { name: "Prime Nightmare", desc: "Prime numbers in sequence from the cursor.", img: "../static/img/lab/primenightmare.png", slug: "prime" },
      { name: "XTT", desc: "Custom message maker with canvas text drawing.", img: "../static/img/lab/xtt.png", slug: "xtt" },
      { name: "Mojo vs. Mine", desc: "Two-player chase game. Mojo=arrows, Mine=WASD.", img: "../static/img/lab/mojo.png", slug: "mojo" },
      { name: "Ball in Box", desc: "Experimenting with a moving spawn point.", img: "../static/img/lab/bib.png", slug: "bib" },
    ];

    const split = document.getElementById('lab-split');
    const list = document.getElementById('lab-list');
    const preview = document.getElementById('lab-preview');
    const previewIframe = document.getElementById('preview-iframe');
    const previewTitle = document.getElementById('preview-title');
    const previewLink = document.getElementById('preview-link');
    let activeIndex = null;

    experiments.forEach((exp, i) => {
      const card = document.createElement('div');
      card.className = 'experiment-card';
      card.setAttribute('data-index', i);
      card.innerHTML = `
        <img src="${exp.img}" alt="${exp.name}" loading="lazy">
        <div class="experiment-card-body">
          <h3>${exp.name}</h3>
          <p>${exp.desc}</p>
        </div>
      `;
      card.addEventListener('click', () => openExperiment(i));
      list.appendChild(card);
    });

    function openExperiment(index) {
      const exp = experiments[index];

      // Activate split view
      split.classList.add('split-active');

      // Highlight active card
      list.querySelectorAll('.experiment-card').forEach(c => c.classList.remove('active'));
      list.children[index].classList.add('active');

      // Load experiment
      previewIframe.src = `./${exp.slug}.html`;
      previewTitle.textContent = exp.name;
      previewLink.href = `./${exp.slug}.html`;

      activeIndex = index;

      // Scroll active card into view in the sidebar
      list.children[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closePreview() {
      split.classList.remove('split-active');
      previewIframe.src = 'about:blank';
      list.querySelectorAll('.experiment-card').forEach(c => c.classList.remove('active'));
      activeIndex = null;
    }
  </script>
</body>
</html>
