<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday</title>
  <link rel="icon" type="image/png" href="/static/img/favicon.png">
  <script type="text/javascript" src="/static/js/libs/head.load.min.js"></script>
  <script type="text/javascript">
  head.load(
    "/static/css/lib/bootstrap.min.css",
    "/static/css/lib/font-awesome.min.css",
    "/static/css/lab.css"
  );
  </script>
  <style type="text/css">
html, body, #canvas{
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  cursor: crosshair;
  overflow: hidden !important;
}
#bdayContainer {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  width: 100%;
  position: fixed;
  top: 0;
  left: 0;
}
#bday{
  font-size: 10vh;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  text-align: center;
  width: 80%;
  color: #4bf;
  text-shadow:

   -2px -2px 0 #FFF,
    2px -2px 0 #FFF,
    -2px 2px 0 #FFF,
     2px 2px 0 #FFF;
  line-height: 2;
  display: none;
  /* disable text selection */
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  -khtml-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}
</style>
</head>
<body>
  <div id="birthdayItem">
  <canvas id="canvas"></canvas>
  <div id='bdayContainer'>
    <h1 id='bday'></h1>
  </div>
</div>
<div id="formItem">
  <form method="GET" action='birthday'>
    <div class="modal">
      <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
          <h3>Birthday Form</h3>
        </div>
        <div class="modal-body">
          <label>Please enter a name:</label>
          <input class="form-control" type="text" name="name" id="name" onkeyup='updatelink()' />
          <label>Please enter an age:</label>
          <input class="form-control" type="text" name="age" id="age" onkeyup='updatelink()'/>
          <label>To share this card, send this link:<br/><a href="#" id="link"></a><label>
        </div>
        <div class="modal-footer">
          <input type="submit" class="btn btn-primary" value="Go!">
        </div>
      </div>
      </div>
    </div>
  </form>
</div>

  <script type="text/javascript">
    head.js(
      "/static/js/libs/jquery.min.js",
      "/static/js/libs/bootstrap.min.js",
      "/static/js/lab/all.js",
      "/static/js/lab/birthday.js"
    );
  </script>
  

  <nav class="navbar navbar-default navbar-fixed-bottom" role="navigation" id="foot">
    <div class="navbar-header">
      <div class="navbar-brand">Birthday</div>
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
      <ul class="nav navbar-nav" role="navigation">
        <li><a href="/lab/">More Experiments</a></li>
        <li><a href="/">Kaiserapps Home</a></li>
      </ul>
      <ul class="nav navbar-nav pull-right">
        <li><a href="#" onclick="$('#foot').css('display','none')"><i class="icon-chevron-down icon-white"></i></a></li>
      </ul>
    </div>
  </nav>
</body>
</html>
